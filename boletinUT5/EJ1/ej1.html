<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>
<body>
    <h2>Registro</h2>
    <form action="#" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" title="Solo letras y espacios">
        </div>
        <div>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" title="Solo letras y espacios">
        </div>
        <div>
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_]+" title="Solo letras, números y guion bajo">
        </div>
        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required pattern="[A-Za-z0-9!*$%]+" title="Solo letras, números y los caracteres especiales !*$%">
        </div>
        <div>
            <label for="fecha_nac">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nac" name="fecha_nac" required>
        </div>
        <div>
            <label>Sexo:</label>
            <div>
                <label><input type="radio" name="sexo" value="masculino" required> Masculino</label>
                <label><input type="radio" name="sexo" value="femenino"> Femenino</label>
                <label><input type="radio" name="sexo" value="otro"> Otro</label>
            </div>
        </div>
        <div>
            <label for="movil">Móvil:</label>
            <input type="tel" id="movil" name="movil" required pattern="\d{10}" title="Debe contener exactamente 10 dígitos">
        </div>
        <div>
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div>
            <label for="ubicacion">Ubicación:</label>
            <select id="ubicacion" name="ubicacion" required>
                <option value="">Seleccione...</option>
                <option value="ciudad1">Ciudad 1</option>
                <option value="ciudad2">Ciudad 2</option>
                <option value="ciudad3">Ciudad 3</option>
            </select>
        </div>
        <div>
            <button type="submit">Registrarse</button>
        </div>
    </form>
</body>
</html>
