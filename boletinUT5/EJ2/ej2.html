<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>
    <h2>Registro</h2>
    <form id="registroForm">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" title="Solo letras y espacios"><br><br>

        <label for="apellidos">Apellidos:</label><br>
        <input type="text" id="apellidos" name="apellidos" required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" title="Solo letras y espacios"><br><br>

        <label for="username">Nombre de usuario:</label><br>
        <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_]+" title="Solo letras, números y guion bajo"><br><br>

        <label for="password">Contraseña:</label><br>
        <input type="password" id="password" name="password" required pattern="[A-Za-z0-9!*$%]+" title="Solo letras, números y los caracteres especiales !*$%"><br><br>

        <label for="fecha_nac">Fecha de nacimiento:</label><br>
        <input type="date" id="fecha_nac" name="fecha_nac" required><br><br>

        <label>Sexo:</label><br>
        <input type="radio" name="sexo" value="masculino" required> Masculino<br>
        <input type="radio" name="sexo" value="femenino"> Femenino<br>
        <input type="radio" name="sexo" value="otro"> Otro<br><br>

        <label for="movil">Móvil:</label><br>
        <input type="tel" id="movil" name="movil" required pattern="\d{9}" title="Debe contener exactamente 10 dígitos"><br><br>

        <label for="email">Correo Electrónico:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="ubicacion">Ubicación:</label><br>
        <select id="ubicacion" name="ubicacion" required>
            <option value="">Seleccione...</option>
            <option value="ciudad1">Ciudad 1</option>
            <option value="ciudad2">Ciudad 2</option>
            <option value="ciudad3">Ciudad 3</option>
        </select><br><br>

        <button type="submit">Registrarse</button>
    </form>

    <script src="ej2.js"></script>
</body>
</html>
